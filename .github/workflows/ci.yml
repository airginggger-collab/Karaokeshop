name: CI

on:
  push:
    branches: [main, master]
  pull_request:
  schedule:
    - cron: "0 8 * * *"   # каждый день в 08:00 UTC (11:00 Алматы) — обновление новостей

jobs:
  build-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - name: Build design tokens
        run: npm run build -w @kk/tokens
      - name: UI tests
        run: npm test -w @kk/ui
      - name: Web unit tests
        run: npm test -w web
      - name: Build web
        run: npm run build -w web
      - name: Build Storybook
        run: npm run build-storybook -w @kk/ui
      - name: Deploy to Cloudflare Workers
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        run: npx wrangler deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}

  lighthouse:
    runs-on: ubuntu-latest
    needs: build-test
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - name: Build design tokens
        run: npm run build -w @kk/tokens
      - name: Build web
        run: npm run build -w web
      - name: Lighthouse CI (Core Web Vitals budget)
        run: npx --yes @lhci/cli@0.14.x autorun
